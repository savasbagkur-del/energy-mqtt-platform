services:
  postgres:
    image: postgres:16-alpine
    container_name: communication-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-communication}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-communication}"]
      interval: 10s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx/emqx:5.10.3
    container_name: communication-emqx
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${EMQX_WS_PORT:-8083}:8083"
      - "${EMQX_WSS_PORT:-8084}:8084"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${MQTT_USERNAME:-admin}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${MQTT_PASSWORD:-public}
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status | grep -qE 'is (running|started)'"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
