services:
  # Self-managed PostgreSQL (co-located with the app on EC2 #2). Not exposed to host/internet;
  # api/worker reach it over the compose network. Data persists in the postgres-data volume.
  # For an external managed DB (RDS) instead: set POSTGRES_HOST to the RDS endpoint and don't start
  # this service (e.g. `docker compose up -d --scale postgres=0` or remove it).
  postgres:
    image: postgres:16-alpine
    container_name: communication-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # EMQX broker. In the recommended 2-instance topology the broker runs on a SEPARATE EC2, so this
  # service is gated behind the `broker` profile (off by default). Enable it only for a single-box
  # deployment: `docker compose ... --profile broker up -d`.
  emqx:
    image: emqx/emqx:5.10.3
    container_name: communication-emqx
    profiles: ["broker"]
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      # MQTT over TLS (8883). EMQX ships a self-signed cert; for production replace the bundled
      # cert under /opt/emqx/etc/certs or mount your own, and point devices at 8883.
      - "${MQTT_TLS_PORT:-8883}:8883"
      - "${EMQX_DASHBOARD_PORT:-18083}:18083"
    environment:
      EMQX_NAME: emqx
      EMQX_HOST: 127.0.0.1
      EMQX_DASHBOARD__DEFAULT_USERNAME: ${MQTT_USERNAME}
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${MQTT_PASSWORD}
      # NOTE: MQTT client authentication is NOT enabled by env here. In EMQX 5.x, enabling it
      # requires configuring an authenticator (built-in database / password) + client credentials
      # via the dashboard or a mounted config; see deploy/RUNBOOK.md "EMQX güvenliği". Do NOT set
      # allow_anonymous=false without an authenticator or all clients (incl. the worker) are rejected.
    volumes:
      - /opt/emqx/data:/opt/emqx/data
      - /opt/emqx/log:/opt/emqx/log
    healthcheck:
      test: ["CMD-SHELL", "emqx ctl status | grep -q 'is running'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # One-shot DB migration. Run explicitly before bringing up api/worker:
  #   docker compose --env-file .env.production -f docker-compose.prod.yml run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: worker
    image: communication-worker:latest
    profiles: ["tools"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    working_dir: /app/packages/db
    command: ["node", "dist/migrate.js"]

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: api
    image: communication-api:latest
    container_name: communication-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      API_PORT: ${API_PORT}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_TLS: ${MQTT_TLS:-false}
      MQTT_TLS_REJECT_UNAUTHORIZED: ${MQTT_TLS_REJECT_UNAUTHORIZED:-true}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID}-api
      # AWS Cost Explorer (optional): lets the billing page pull the real monthly bill.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_COST_REGION: ${AWS_COST_REGION:-us-east-1}
    ports:
      # Bound to loopback only: the API is reached via nginx over the compose network
      # (proxy_pass http://api:3000). The host port stays off the public interface.
      - "127.0.0.1:${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:'+(process.env.API_PORT||3000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  mqtt-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      target: worker
    image: communication-worker:latest
    container_name: communication-mqtt-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MQTT_HOST: ${MQTT_HOST}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_TLS: ${MQTT_TLS:-false}
      MQTT_TLS_REJECT_UNAUTHORIZED: ${MQTT_TLS_REJECT_UNAUTHORIZED:-true}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID}
      MQTT_SHARED_GROUP: ${MQTT_SHARED_GROUP:-}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-9100}
      DEVICE_WHITELIST_ENABLED: ${DEVICE_WHITELIST_ENABLED:-false}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_MIN_INTERVAL_SEC: ${ALERT_MIN_INTERVAL_SEC:-300}
      ALERT_WEBHOOK_TIMEOUT_MS: ${ALERT_WEBHOOK_TIMEOUT_MS:-5000}
      RECONCILE_ENABLED: ${RECONCILE_ENABLED:-true}
      RECONCILE_INTERVAL_MS: ${RECONCILE_INTERVAL_MS:-5000}
      DEVICE_ONLINE_TTL_SEC: ${DEVICE_ONLINE_TTL_SEC:-600}
      PG_POOL_MAX: ${PG_POOL_MAX:-20}
      MQTT_INBOUND_CONCURRENCY: ${MQTT_INBOUND_CONCURRENCY:-16}
      PUBLISH_BATCH_SIZE: ${PUBLISH_BATCH_SIZE:-50}
    ports:
      # Loopback only: scraped by Prometheus over the compose network (mqtt-worker:9100).
      - "127.0.0.1:${WORKER_HEALTH_PORT:-9100}:9100"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:'+(process.env.WORKER_HEALTH_PORT||9100)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # Optional TLS-terminating reverse proxy for the API. Enable with: --profile tls
  # Requires infra/nginx/certs/{fullchain.pem,privkey.pem}. When used, consider changing the
  # api service port mapping to "127.0.0.1:${API_PORT:-3000}:3000" so the API is only reachable
  # through nginx (TLS).
  nginx:
    image: nginx:1.27-alpine
    container_name: communication-nginx
    profiles: ["tls"]
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro

  # Observability stack (Prometheus + Grafana). Enable with: --profile monitoring
  # Prometheus scrapes api:3000/metrics and mqtt-worker:9100/metrics on the compose network.
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: communication-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"

  # Routes Prometheus alerts to a webhook/Slack/email. Config: infra/alertmanager/alertmanager.yml
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: communication-alertmanager
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: communication-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
