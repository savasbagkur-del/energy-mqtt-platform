# TLS-terminating reverse proxy for the API (Wave 4 / production hardening).
# Put your certificate + key in infra/nginx/certs/ (fullchain.pem, privkey.pem) — e.g. from
# Let's Encrypt/ACM — and run the stack with the `tls` profile:
#   docker compose --env-file .env.production -f docker-compose.prod.yml --profile tls up -d
# When nginx fronts the API, bind the API container port to localhost only (see compose notes)
# so the API is reachable solely through TLS.

worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  # Brute-force throttle for the panel login. Per-IP: ~10 attempts/min sustained, small burst for
  # legitimate retypes. Excess requests get 429 instead of reaching the API.
  limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
  limit_req_status 429;

  # Redirect plain HTTP to HTTPS.
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Basic hardening headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 12m;  # CSV import / bulk register

    # Resolve the `api` service via Docker's embedded DNS at request time. Using a variable in
    # proxy_pass forces re-resolution (valid=10s) so an API container restart (new IP) recovers
    # automatically instead of pinning a stale upstream IP and returning 502 until a manual reload.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:3000;

    # Rate-limited login endpoint (brute-force protection). Must precede `location /`.
    location = /auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    location / {
      proxy_pass http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }
}
