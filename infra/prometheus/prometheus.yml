global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

# Fire evaluated alerts to Alertmanager (monitoring profile). If Alertmanager is not running,
# Prometheus still evaluates rules and shows them under Alerts; only delivery is skipped.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # API exposes /metrics on its HTTP port (open path, no auth token required).
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]
        labels:
          service: api

  # Worker health server exposes /metrics on WORKER_HEALTH_PORT (default 9100).
  - job_name: mqtt-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["mqtt-worker:9100"]
        labels:
          service: mqtt-worker
